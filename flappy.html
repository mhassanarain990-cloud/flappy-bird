<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Gold: </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: manipulation; }
        canvas { border: 2px solid #444; max-width: 100%; max-height: 100vh; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); transition: background 1s ease; }
        #ui { position: absolute; text-align: center; pointer-events: none; z-index: 10; width: 100%; color: white; font-family: 'Arial Black', sans-serif; }
        .btn { pointer-events: all; background: #ffd700; color: #000; padding: 12px 35px; border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 15px; display: inline-block; box-shadow: 0 4px 0 #b8860b; transition: transform 0.1s; }
        .btn:active { transform: translateY(4px); box-shadow: 0 0 0 #b8860b; }
        .hidden { display: none !important; }
        #level-announcement { position: absolute; top: 30%; width: 100%; text-align: center; font-size: 50px; font-weight: 900; color: #fff; text-shadow: 0 0 20px #ff0000; opacity: 0; transition: opacity 0.5s; z-index: 20; pointer-events: none; font-style: italic; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="start-screen">
            <h1 class="text-5xl font-black text-yellow-400 italic mb-4">FLAPPY GOLD</h1>
            <p class="text-sm opacity-70">Levels & Offline Mode</p>
            <div class="btn" onclick="startGame()">TAP TO FLY</div>
        </div>
        <div id="game-over" class="hidden">
            <h1 class="text-4xl font-bold text-red-500 mb-2">GAME OVER</h1>
            <p id="final-score" class="text-2xl mb-1">Score: 0</p>
            <p id="final-level" class="text-lg text-yellow-400 mb-4">Level: 1</p>
            <div class="btn" onclick="startGame()">RETRY</div>
        </div>
    </div>

    <div id="level-announcement">LEVEL 2!</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 600;

        let bird, pipes, coins, score, gameActive = false, gameSpeed, pipeGap, floatingTexts = [];
        let currentLevel = 1;

        // Level Themes (Background & Pipes)
        const themes = {
            1: { bgTop: "#0b0e14", bgBot: "#1a2a44", pipeFill: "#1e3a1e", pipeStroke: "#4ec0ca" }, // Night City
            2: { bgTop: "#110000", bgBot: "#2d0000", pipeFill: "#000000", pipeStroke: "#ff0000" }, // Dark Forest (Black/Red)
            3: { bgTop: "#05001a", bgBot: "#1a0033", pipeFill: "#111111", pipeStroke: "#b829ff" }, // Neon Highway
            4: { bgTop: "#1a1a00", bgBot: "#333300", pipeFill: "#222222", pipeStroke: "#ffff00" }  // Golden Rush
        };

        function init() {
            bird = { x: 60, y: 300, w: 34, h: 24, velocity: 0, gravity: 0.26, jump: -5.8 };
            pipes = []; coins = []; floatingTexts = [];
            score = 0; 
            currentLevel = 1;
            gameSpeed = 3.2; 
            pipeGap = 170;   
            gameActive = true;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over').classList.add('hidden');
            spawnObstacles();
        }

        function spawnObstacles() {
            let minH = 50;
            let topH = Math.random() * (canvas.height - pipeGap - 150) + minH;
            pipes.push({ x: canvas.width, y: topH, w: 70, passed: false });
            coins.push({ x: canvas.width + 110, y: topH + pipeGap/2, collected: false });
        }

        function addFloatingText(x, y, txt, color) {
            floatingTexts.push({ x: x, y: y, text: txt, color: color, opacity: 1, speed: 2 });
        }

        function showLevelUpMessage(level) {
            const msg = document.getElementById('level-announcement');
            msg.innerText = "LEVEL " + level + "!";
            msg.style.opacity = 1;
            setTimeout(() => { msg.style.opacity = 0; }, 2000);
        }

        function update() {
            if (!gameActive) return;
            
            // Check Level Up (Har 10 score par)
            let calculatedLevel = Math.floor(score / 10) + 1;
            if (calculatedLevel > currentLevel && calculatedLevel <= 4) {
                currentLevel = calculatedLevel;
                gameSpeed += 0.5; // Speed up!
                pipeGap = Math.max(120, pipeGap - 10); // Gap chota ho jayega
                showLevelUpMessage(currentLevel);
                addFloatingText(200, 300, "SPEED UP!", "#ff0000");
            }

            // Draw Background based on Level Theme
            let theme = themes[currentLevel] || themes[4];
            let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, theme.bgTop);
            gradient.addColorStop(1, theme.bgBot);
            ctx.fillStyle = gradient; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            let lastPipe = pipes[pipes.length - 1];
            if (canvas.width - lastPipe.x >= 240) spawnObstacles();

            pipes.forEach((p, i) => {
                p.x -= gameSpeed;
                let drawX = Math.floor(p.x); let drawY = Math.floor(p.y);
                
                // Draw Pipes based on Theme
                ctx.fillStyle = theme.pipeFill;
                ctx.fillRect(drawX, 0, p.w, drawY);
                ctx.fillRect(drawX, drawY + pipeGap, p.w, canvas.height);
                ctx.strokeStyle = theme.pipeStroke; ctx.lineWidth = 2;
                ctx.strokeRect(drawX, 0, p.w, drawY);
                ctx.strokeRect(drawX, drawY + pipeGap, p.w, canvas.height);

                if (bird.x + 15 > p.x && bird.x - 15 < p.x + p.w) {
                    if (bird.y - 10 < p.y || bird.y + 10 > p.y + pipeGap) die();
                }
                if (p.x + p.w < bird.x && !p.passed) { 
                    score++; p.passed = true; 
                    addFloatingText(bird.x, bird.y - 20, "+1", "white");
                }
                if (p.x < -100) pipes.splice(i, 1);
            });

            coins.forEach((c, i) => {
                c.x -= gameSpeed;
                if (!c.collected) {
                    let drawCX = Math.floor(c.x); let drawCY = Math.floor(c.y);
                    ctx.fillStyle = "#FFD700";
                    ctx.beginPath(); ctx.arc(drawCX, drawCY, 12, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = "white"; ctx.stroke();

                    if (Math.hypot(bird.x - c.x, bird.y - c.y) < 35) {
                        c.collected = true; score += 2;
                        addFloatingText(bird.x, bird.y - 30, "+2 GOLD", "#FFD700");
                    }
                }
                if (c.x < -50) coins.splice(i, 1);
            });

            floatingTexts.forEach((ft, i) => {
                ft.y -= ft.speed; ft.opacity -= 0.03;
                ctx.globalAlpha = Math.max(0, ft.opacity);
                ctx.fillStyle = ft.color; ctx.font = "bold 22px Arial";
                ctx.fillText(ft.text, Math.floor(ft.x), Math.floor(ft.y));
                ctx.globalAlpha = 1;
                if (ft.opacity <= 0) floatingTexts.splice(i, 1);
            });

            if (bird.y > canvas.height || bird.y < 0) die();

            // Draw Bird
            ctx.save();
            ctx.translate(Math.floor(bird.x + bird.w/2), Math.floor(bird.y + bird.h/2));
            ctx.rotate(Math.min(Math.PI/4, Math.max(-Math.PI/8, bird.velocity * 0.1)));
            ctx.fillStyle = "#FFD700";
            ctx.beginPath(); ctx.ellipse(0, 0, 18, 13, 0, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#000"; ctx.stroke();
            ctx.restore();

            // UI (Score & Level)
            ctx.fillStyle = "white"; ctx.font = "bold 40px Arial"; ctx.textAlign = "center";
            ctx.fillText(score, 200, 60);
            ctx.font = "bold 16px Arial"; ctx.fillStyle = "#aaa";
            ctx.fillText("LEVEL " + currentLevel, 200, 85);

            requestAnimationFrame(update);
        }

        function die() {
            gameActive = false;
            document.getElementById('final-score').innerText = "Score: " + score;
            document.getElementById('final-level').innerText = "Reached Level: " + currentLevel;
            document.getElementById('game-over').classList.remove('hidden');
        }

        function startGame() { init(); update(); }

        const input = () => { if(gameActive) bird.velocity = bird.jump; };
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') input(); });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); input(); }, {passive: false});
        canvas.addEventListener('mousedown', input);
    </script>
</body>
</html>
